<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HUB // TAILWIND CYBER</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0b0e1a, #060810);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== BARRE DE NAVIGATION ===== */
        .nav-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            background: rgba(16, 18, 32, 0.6);
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px) saturate(1.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        .nav-bar::-webkit-scrollbar { height: 4px; }
        .nav-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

        /* ===== BOUTONS SOCKET ===== */
        .btn-socket {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 14px;
            min-width: 60px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 10px; /* Moins arrondi */
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: relative;
        }

        .btn-socket::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 10px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-socket:hover::after { opacity: 1; }

        .btn-socket:active { transform: scale(0.96); }
        .btn-socket:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        /* État actif PWA */
        .btn-socket.active {
            background: rgba(94, 92, 224, 0.12);
            border-color: rgba(94, 92, 224, 0.5);
            box-shadow: 0 0 20px rgba(94, 92, 224, 0.08), inset 0 0 20px rgba(94, 92, 224, 0.04);
            transform: translateY(-1px);
        }
        .btn-socket.active .pwa-btn { color: #fff; }
        .btn-socket.active .led {
            background: #5e5ce0;
            box-shadow: 0 0 14px #5e5ce0;
        }

        /* État Power ON */
        .btn-socket.power-on {
            background: rgba(255, 60, 60, 0.1);
            border-color: rgba(255, 60, 60, 0.35);
            box-shadow: 0 0 20px rgba(255, 60, 60, 0.06);
        }
        .btn-socket.power-on .led {
            background: #ff3b30;
            box-shadow: 0 0 14px #ff3b30;
        }
        .btn-socket.power-on .pwa-btn { color: #ff8a8a; }

        /* ===== LED ===== */
        .led {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #3c465a;
            transition: all 0.3s;
            flex-shrink: 0;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
        }

        /* ===== BOUTON PWA ===== */
        .pwa-btn {
            background: none;
            border: none;
            color: #94a0b8;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            cursor: pointer;
            padding: 0;
            pointer-events: none;
            transition: color 0.2s;
            white-space: nowrap;
        }

        /* ===== BOUTON POWER SPÉCIFIQUE ===== */
        #socket-power {
            touch-action: none;
            background: rgba(255, 60, 60, 0.04);
            border-color: rgba(255, 60, 60, 0.08);
        }
        #socket-power .pwa-btn {
            font-size: 9px;
            letter-spacing: 0.8px;
            color: #ff6b6b;
        }
        #socket-power.power-on {
            background: rgba(255, 60, 60, 0.12);
            border-color: rgba(255, 60, 60, 0.35);
        }
        #socket-power.power-on .pwa-btn { color: #ffb0b0; }

        /* ===== WORKSPACE ET PHONE ===== */
        .workspace {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background: radial-gradient(ellipse at 30% 40%, rgba(40, 60, 120, 0.15), transparent 70%);
        }
        .phone-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 750px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px) saturate(1.6);
            -webkit-backdrop-filter: blur(20px) saturate(1.6);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-area {
            flex: 1;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #0a0a18;
        }
        iframe.active {
            display: block;
        }

        #power-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #3c465a;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            background-size: cover;
            background-position: center;
            transition: opacity 0.4s;
        }
        #power-overlay.hidden { display: none !important; }
        #power-overlay.cover {
            background-image: url('cover.png');
            filter: grayscale(100%) opacity(0.2);
        }

        /* ===== MODALE ===== */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: rgba(16, 18, 32, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            padding: 24px 20px 30px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.03);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 12px;
        }
        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #b8b8ff, #7a78ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .modal-close {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .modal-field {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .field-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 4px;
        }
        .field-row label {
            font-size: 10px;
            text-transform: uppercase;
            color: #7a78ff;
            min-width: 34px;
            font-weight: 700;
        }
        .field-row input {
            flex: 1;
            padding: 6px 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }
        .field-row input:focus { border-color: #5e5ce0; outline: none; }
        .btn-group {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 8px;
        }
        .btn-group button {
            padding: 4px 12px;
            border-radius: 6px;
            border: none;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .delete-btn { background: rgba(40,10,10,0.6); color: #ff6b6b; }
        .delete-btn:hover { background: rgba(60,20,20,0.8); }
        .open-btn { background: rgba(40,40,80,0.4); color: #b8b8ff; }
        .open-btn:hover { background: rgba(60,60,120,0.5); }
        .add-section {
            margin-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .add-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .add-row input {
            flex: 1;
            padding: 6px 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            min-width: 100px;
        }
        .add-row input:focus { border-color: #5e5ce0; outline: none; }
        .add-btn, .cover-btn {
            padding: 6px 16px;
            background: rgba(40,40,80,0.4);
            color: #b8b8ff;
            border: 1px solid rgba(94,92,224,0.2);
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 12px;
            align-self: flex-end;
        }
        .add-btn:hover, .cover-btn:hover { background: rgba(60,60,120,0.5); }
        .cover-btn { width: 100%; text-align: center; }
        .cover-btn.active { background: rgba(60,60,140,0.4); border-color: #5e5ce0; color: #fff; }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        .modal-actions button {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-save { background: rgba(94,92,224,0.3); color: #fff; border: 1px solid rgba(94,92,224,0.3); }
        .btn-save:hover { background: rgba(94,92,224,0.5); transform: translateY(-2px); }
        .btn-cancel { background: rgba(40,40,40,0.4); color: #aaa; border: 1px solid rgba(255,255,255,0.04); }
        .btn-cancel:hover { background: rgba(60,60,60,0.6); color: #ddd; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .workspace { padding: 0; }
            .phone-container { max-width: 100%; max-height: 100%; border-radius: 0; border: none; }
            .nav-bar { padding: 10px 12px; gap: 6px; }
            .btn-socket { padding: 6px 10px; min-width: 48px; }
            .pwa-btn { font-size: 8px; }
            .modal-content { padding: 16px; }
        }
    </style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body>

    <nav class="nav-bar">
        <div id="socket-power" class="btn-socket"
             onpointerdown="startPress(event)"
             onpointerup="endPress(event)"
             onpointerleave="cancelPress(event)"
             onpointercancel="cancelPress(event)"
             oncontextmenu="event.preventDefault()">
            <div class="led"></div>
            <button class="pwa-btn">PWR</button>
        </div>
        <div id="tabs-container" style="display:flex; gap:10px;"></div>
    </nav>

    <main class="workspace">
        <div class="phone-container">
            <div id="power-overlay">SYSTEM OFFLINE</div>
            <div id="content-area" class="content-area"></div>
        </div>
    </main>

    <div id="config-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚡ CONFIGURER</h2>
                <button class="modal-close" id="modal-close-btn">✕</button>
            </div>
            <div id="modal-fields-container"></div>
            <div class="add-section">
                <div class="add-row">
                    <input type="text" id="add-name" placeholder="Nom" />
                    <input type="url" id="add-url" placeholder="https://..." />
                </div>
                <button class="add-btn" id="add-btn">➕ Ajouter</button>
                <button class="cover-btn" id="cover-btn">Cover: OFF</button>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="modal-cancel-btn">Annuler</button>
                <button class="btn-save" id="modal-save-btn">Sauvegarder</button>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  AUDIO (sons tactiles)
        // ================================================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playClickSound(freq = 800, duration = 0.06, volume = 0.12) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playPowerSound() {
            // son de mise sous/hors tension : un peu plus grave et plus long
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // ================================================================
        //  DONNÉES
        // ================================================================
        const STORAGE_KEY = 'pwaList';
        const COVER_KEY = 'coverEnabled';
        let pwaList = [];
        let coverEnabled = false;
        let isPoweredOn = false;
        let activePwaId = null;
        let pressTimer = null;
        let pressStart = 0;

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            pwaList = stored ? JSON.parse(stored) : [
                { id: 'pwa-1', name: 'Reactor', url: 'https://mekeirish.github.io/Reactor4/' },
                { id: 'pwa-2', name: 'Master', url: 'https://mekeirish.github.io/Mastercode/' }
            ];
            coverEnabled = localStorage.getItem(COVER_KEY) === 'true';
            saveData();
        }
        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(pwaList)); }
        function saveCoverState() { localStorage.setItem(COVER_KEY, String(coverEnabled)); }

        // ================================================================
        //  RENDU
        // ================================================================
        function render() {
            const container = document.getElementById('content-area');
            const tabs = document.getElementById('tabs-container');

            container.innerHTML = '';
            tabs.innerHTML = '';

            pwaList.forEach(pwa => {
                const iframe = document.createElement('iframe');
                iframe.id = pwa.id;
                iframe.src = pwa.url;
                container.appendChild(iframe);

                const socket = document.createElement('div');
                socket.className = 'btn-socket';
                socket.id = `btn-${pwa.id}`;
                socket.innerHTML = `<div class="led"></div><button class="pwa-btn">${pwa.name}</button>`;
                socket.addEventListener('click', function(e) {
                    playClickSound(800, 0.05, 0.1);
                    switchTab(pwa.id);
                });
                tabs.appendChild(socket);
            });

            if (isPoweredOn && activePwaId) {
                const btn = document.getElementById(`btn-${activePwaId}`);
                if (btn) btn.classList.add('active');
                const iframe = document.getElementById(activePwaId);
                if (iframe) iframe.classList.add('active');
            }

            updateCoverUI();
        }

        function updateCoverUI() {
            const overlay = document.getElementById('power-overlay');
            const coverBtn = document.getElementById('cover-btn');
            if (coverEnabled && !isPoweredOn) {
                overlay.classList.add('cover');
                overlay.textContent = '';
            } else {
                overlay.classList.remove('cover');
                overlay.textContent = isPoweredOn ? '' : 'SYSTEM OFFLINE';
            }
            if (coverBtn) {
                coverBtn.textContent = coverEnabled ? 'Cover: ON' : 'Cover: OFF';
                coverBtn.classList.toggle('active', coverEnabled);
            }
        }

        // ================================================================
        //  POWER (Pointer Events)
        // ================================================================
        function startPress(e) {
            playClickSound(600, 0.04, 0.08);
            pressStart = Date.now();
            pressTimer = setTimeout(() => {
                openModal();
                pressTimer = null;
            }, 500);
        }

        function endPress(e) {
            if (pressTimer !== null) {
                clearTimeout(pressTimer);
                pressTimer = null;
                if (Date.now() - pressStart < 500) {
                    togglePower();
                }
            }
        }

        function cancelPress(e) {
            if (pressTimer !== null) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
        }

        function togglePower() {
            playPowerSound();
            isPoweredOn = !isPoweredOn;
            const overlay = document.getElementById('power-overlay');
            const socket = document.getElementById('socket-power');
            if (isPoweredOn) {
                overlay.classList.add('hidden');
                socket.classList.add('power-on');
                if (!activePwaId && pwaList.length) {
                    activePwaId = pwaList[0].id;
                }
                switchTab(activePwaId);
            } else {
                overlay.classList.remove('hidden');
                socket.classList.remove('power-on');
                activePwaId = null;
                document.querySelectorAll('.btn-socket:not(#socket-power)').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('iframe').forEach(i => i.classList.remove('active'));
            }
            updateCoverUI();
        }

        // ================================================================
        //  SWITCH TAB
        // ================================================================
        function switchTab(id) {
            if (!isPoweredOn) return;
            document.querySelectorAll('.btn-socket:not(#socket-power)').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(i => i.classList.remove('active'));
            const btn = document.getElementById(`btn-${id}`);
            if (btn) btn.classList.add('active');
            const iframe = document.getElementById(id);
            if (iframe) iframe.classList.add('active');
            activePwaId = id;
        }

        // ================================================================
        //  MODALE
        // ================================================================
        function openModal() {
            document.getElementById('config-modal').classList.add('open');
            populateModal();
        }
        function closeModal() {
            document.getElementById('config-modal').classList.remove('open');
        }

        function populateModal() {
            const container = document.getElementById('modal-fields-container');
            container.innerHTML = '';
            pwaList.forEach(item => {
                const div = document.createElement('div');
                div.className = 'modal-field';

                const nameRow = document.createElement('div');
                nameRow.className = 'field-row';
                nameRow.innerHTML = `<label>Nom</label><input type="text" value="${item.name}" id="modal-name-${item.id}" />`;
                div.appendChild(nameRow);

                const urlRow = document.createElement('div');
                urlRow.className = 'field-row';
                urlRow.innerHTML = `<label>Lien</label><input type="url" value="${item.url}" id="modal-url-${item.id}" />`;
                div.appendChild(urlRow);

                const btnGroup = document.createElement('div');
                btnGroup.className = 'btn-group';

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = '🗑 Supprimer';
                delBtn.dataset.id = item.id;
                delBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    const id = e.currentTarget.dataset.id;
                    if (confirm(`Supprimer "${pwaList.find(i => i.id === id)?.name}" ?`)) {
                        pwaList = pwaList.filter(i => i.id !== id);
                        if (activePwaId === id) activePwaId = null;
                        saveData();
                        render();
                        populateModal();
                    }
                });
                btnGroup.appendChild(delBtn);

                const openBtn = document.createElement('button');
                openBtn.className = 'open-btn';
                openBtn.textContent = '🔗 Ouvrir';
                openBtn.dataset.id = item.id;
                openBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    const pwa = pwaList.find(i => i.id === e.currentTarget.dataset.id);
                    if (pwa) window.open(pwa.url, '_blank');
                });
                btnGroup.appendChild(openBtn);

                div.appendChild(btnGroup);
                container.appendChild(div);
            });
            updateCoverUI();
        }

        function saveModalChanges() {
            pwaList.forEach(item => {
                const nameInput = document.getElementById(`modal-name-${item.id}`);
                const urlInput = document.getElementById(`modal-url-${item.id}`);
                if (nameInput) {
                    const newName = nameInput.value.trim();
                    if (newName) item.name = newName;
                }
                if (urlInput) {
                    const newUrl = urlInput.value.trim();
                    if (newUrl) item.url = newUrl;
                }
            });
            saveData();
            render();
            if (isPoweredOn && activePwaId) {
                const iframe = document.getElementById(activePwaId);
                const pwa = pwaList.find(i => i.id === activePwaId);
                if (iframe && pwa) {
                    iframe.src = pwa.url;
                    iframe.classList.add('active');
                }
            }
            closeModal();
        }

        function addItem() {
            const nameInput = document.getElementById('add-name');
            const urlInput = document.getElementById('add-url');
            const name = nameInput.value.trim();
            const url = urlInput.value.trim();
            if (!name || !url) { alert('Veuillez remplir le nom et l\'URL.'); return; }
            const newId = 'pwa-' + Date.now();
            pwaList.push({ id: newId, name, url });
            saveData();
            nameInput.value = '';
            urlInput.value = '';
            render();
            populateModal();
            if (isPoweredOn) switchTab(newId);
            playClickSound(1000, 0.04, 0.08);
        }

        function toggleCover() {
            coverEnabled = !coverEnabled;
            saveCoverState();
            updateCoverUI();
            playClickSound(700, 0.04, 0.08);
        }

        document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
        document.getElementById('modal-save-btn').addEventListener('click', saveModalChanges);
        document.getElementById('add-btn').addEventListener('click', addItem);
        document.getElementById('cover-btn').addEventListener('click', toggleCover);

        // ================================================================
        //  POSTMESSAGE
        // ================================================================
        window.addEventListener('message', (event) => {
            const msg = event.data;
            if (msg?.type === 'HUB_ROUTER' && msg.target) {
                const iframe = document.getElementById(msg.target);
                if (iframe) {
                    iframe.contentWindow.postMessage(msg.payload, '*');
                }
            }
        });

        // ================================================================
        //  SERVICE WORKER CLEANUP
        // ================================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }

        // ================================================================
        //  INIT
        // ================================================================
        loadData();
        render();
        document.getElementById('power-overlay').classList.remove('hidden');
        document.getElementById('socket-power').classList.remove('power-on');
        updateCoverUI();
    </script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>
